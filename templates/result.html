<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prediction Result</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
            padding:20px;
        }

        .result-container{
            width:100%;
            max-width:700px;
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.3);
            animation:fadeIn 1s ease;
        }

        h1{
            text-align:center;
            color:#203a43;
            margin-bottom:30px;
            font-size:36px;
        }

        .card{
            background:#f8f9fc;
            padding:20px;
            border-radius:15px;
            margin-bottom:25px;
            border-left:6px solid #2c5364;
        }

        .card h3{
            color:#203a43;
            margin-bottom:10px;
            font-size:22px;
        }

        .card p{
            color:#555;
            line-height:1.7;
            font-size:17px;
            word-wrap:break-word;
        }

        .prediction-box{
            text-align:center;
            background:linear-gradient(135deg,#11998e,#38ef7d);
            color:white;
            padding:25px;
            border-radius:18px;
            margin-top:20px;
            box-shadow:0 8px 20px rgba(0,0,0,0.2);
        }

        .prediction-box h2{
            font-size:30px;
            margin-top:10px;
        }

        .btn{
            display:block;
            width:fit-content;
            margin:30px auto 0;
            text-decoration:none;
            background:linear-gradient(135deg,#203a43,#2c5364);
            color:white;
            padding:14px 28px;
            border-radius:12px;
            font-size:17px;
            font-weight:bold;
            transition:0.3s;
        }

        .btn:hover{
            transform:translateY(-3px);
            box-shadow:0 8px 18px rgba(0,0,0,0.2);
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(20px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        @media(max-width:600px){

            .result-container{
                padding:25px;
            }

            h1{
                font-size:28px;
            }

            .card h3{
                font-size:20px;
            }

            .card p{
                font-size:15px;
            }

            .prediction-box h2{
                font-size:24px;
            }

            .btn{
                width:100%;
                text-align:center;
            }

        }

    </style>

</head>

<body>

    <div class="result-container">

        <h1>Prediction Result</h1>

        <div class="card">
            <h3>Complaint</h3>
            <p>{{ complaint }}</p>
        </div>

        <div class="prediction-box">
            <h3>Predicted Priority</h3>
            <h2>{{ prediction }}</h2>
        </div>

        <a href="/" class="btn">
            Try Another Complaint
        </a>
    </div>
</body>
</html>
