<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Complaint Routing System</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg,#1e3c72,#2a5298);
            padding:20px;
        }

        .container{
            width:100%;
            max-width:600px;
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.3);
            animation: fadeIn 1s ease;
        }

        h1{
            text-align:center;
            color:#1e3c72;
            margin-bottom:10px;
            font-size:32px;
        }

        .subtitle{
            text-align:center;
            color:gray;
            margin-bottom:30px;
            font-size:16px;
        }

        form{
            display:flex;
            flex-direction:column;
        }

        textarea{
            width:100%;
            padding:18px;
            border:2px solid #dcdcdc;
            border-radius:12px;
            resize:none;
            font-size:16px;
            transition:0.3s;
            outline:none;
        }

        textarea:focus{
            border-color:#2a5298;
            box-shadow:0 0 10px rgba(42,82,152,0.3);
        }

        button{
            margin-top:25px;
            padding:15px;
            border:none;
            border-radius:12px;
            background:linear-gradient(135deg,#1e3c72,#2a5298);
            color:white;
            font-size:18px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            transform:translateY(-3px);
            box-shadow:0 8px 20px rgba(0,0,0,0.2);
        }

        button:active{
            transform:scale(0.98);
        }

        .footer-text{
            text-align:center;
            margin-top:20px;
            color:gray;
            font-size:14px;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(20px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        @media(max-width:600px){

            .container{
                padding:25px;
            }

            h1{
                font-size:26px;
            }

            textarea{
                font-size:15px;
            }

            button{
                font-size:16px;
            }

        }

    </style>

</head>

<body>

    <div class="container">

        <h1>AI Complaint Routing System</h1>

        <p class="subtitle">
            Smart AI-based complaint analysis and priority prediction
        </p>

        <form action="/predict" method="POST">

            <textarea
                name="complaint"
                rows="6"
                placeholder="Enter your complaint here..."
                required>
            </textarea>

            <button type="submit">
                Predict Priority
            </button>

        </form>

        <div class="footer-text">
            Powered by AI & Machine Learning
        </div>

    </div>

</body>
</html>
